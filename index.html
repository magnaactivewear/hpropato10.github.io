<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAGNA Activewear</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
}

.topbar{
background:#eaa1c4;
color:white;
padding:10px;
text-align:center;
font-size:14px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #eee;
}

.logo img{
height:70px;
}

.icons{
font-size:28px;
cursor:pointer;
}

.hero{
text-align:center;
padding:30px 15px;
}

.hero img{
width:100%;
max-width:800px;
border-radius:10px;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.product img{
width:100%;
height:250px;
object-fit:cover;
}

.product h3{
text-align:center;
margin-top:10px;
}

.product p{
text-align:center;
margin-top:5px;
}

.product button{
display:block;
margin:10px auto;
background:#eaa1c4;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

#cartPanel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100vh;
background:white;
box-shadow:-4px 0 15px rgba(0,0,0,.15);
transition:.3s;
z-index:9999;
padding:20px;
display:flex;
flex-direction:column;
}

#cartPanel.open{
right:0;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.cart-header button{
border:none;
background:none;
font-size:24px;
cursor:pointer;
}

#cartItems{
flex:1;
overflow:auto;
}

.cart-row{
padding:12px 0;
border-bottom:1px solid #eee;
}

#sendOrder{
background:#25d366;
color:white;
border:none;
padding:15px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

@media(min-width:900px){

.products{
grid-template-columns:repeat(4,1fr);
}

}

</style>
</head>

<body>

<div class="topbar">
🚚 Envíos gratis en el día (MDP) | 📍 Pick Up zona centro
</div>

<header>

<div class="logo">
<img src="logo.jpeg">
</div>

<div class="icons">
<span onclick="showCart()">🛍️</span>
</div>

</header>

<section class="hero">

<h1>¡Bienvenida a MAGNA!</h1>

<img src="banner.jpeg">

</section>

<section class="products">

<div class="product">
<img src="producto1.jpeg">
<h3>Top Emilia Negro</h3>
<p>$30.000</p>
<button onclick="addItem('Top Emilia Negro')">Agregar al carrito</button>
</div>

<div class="product">
<img src="producto2.jpeg">
<h3>Top Emilia Negro</h3>
<p>$30.000</p>
<button onclick="addItem('Top Emilia Negro')">Agregar al carrito</button>
</div>

<div class="product">
<img src="producto3.jpeg">
<h3>Conjunto Emilia Negro</h3>
<p>$59.900</p>
<button onclick="addItem('Conjunto Emilia Negro')">Agregar al carrito</button>
</div>

<div class="product">
<img src="producto4.jpeg">
<h3>Calza Emilia</h3>
<p>$35.000</p>
<button onclick="addItem('Calza Emilia')">Agregar al carrito</button>
</div>

<div class="product">
<img src="producto5.jpeg">
<h3>Top Renata Rosa</h3>
<p>$30.000</p>
<button onclick="addItem('Top Renata Rosa')">Agregar al carrito</button>
</div>

<div class="product">
<img src="producto6.jpeg">
<h3>Top Emilia Chocolate</h3>
<p>$30.000</p>
<button onclick="addItem('Top Emilia Chocolate')">Agregar al carrito</button>
</div>

</section>

<div id="cartPanel">

<div class="cart-header">

<h2>Mi Carrito</h2>

<button onclick="closeCart()">✕</button>

</div>

<div id="cartItems">

Tu carrito está vacío

</div>

<button id="sendOrder" onclick="sendWhatsapp()">

Enviar pedido por WhatsApp

</button>

</div>

<script>

let cart = [];

function addItem(item){

cart.push(item);

alert(item + " agregado al carrito");

}

function showCart(){

const panel =
document.getElementById("cartPanel");

const items =
document.getElementById("cartItems");

panel.classList.add("open");

if(cart.length === 0){

items.innerHTML =
"Tu carrito está vacío";

return;

}

items.innerHTML = "";

cart.forEach((item,index)=>{

items.innerHTML +=
"<div class='cart-row'>" +
(index+1) +
") " +
item +
"</div>";

});

}

function closeCart(){

document
.getElementById("cartPanel")
.classList.remove("open");

}

function sendWhatsapp(){

if(cart.length === 0){

alert("Agregá productos primero");

return;

}

let mensaje =
"Hola Magna Activewear!\n\n";

mensaje +=
"Quiero realizar el siguiente pedido:\n\n";

cart.forEach((item,index)=>{

mensaje +=
(index+1) +
") " +
item +
"\n";

});

mensaje +=
"\nEspero tu respuesta para coordinar el pago y envío.\n\nMuchas gracias.";

window.open(
"https://wa.me/542235821368?text=" +
encodeURIComponent(mensaje),
"_blank"
);

}

</script>

</body>
</html>
